version: "3"

services:
  postgres:
    image: postgres:12.2-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: root
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"

  nakama:
    image: heroiclabs/nakama:3.22.0
    depends_on:
      - postgres
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address postgres:5432 &&
        exec /nakama/nakama --name nakama1
        --database.address postgres:5432
        --database.user root
        --database.password localdb
        --session.token_expiry_sec 7200
        --logger.level DEBUG
    ports:
      - "7350:7350"   # HTTP
      - "7351:7351"   # gRPC
      - "7349:7349"   # Console